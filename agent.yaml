spec_version: "0.1.0"
name: proposal-writer
version: "1.0.0"
description: >
  Technical proposal generation with ROI calculation, three-tier pricing,
  and business-value framing. Problem-Agitate-Solve narrative with optional
  PDF export.
license: MIT

model:
  preferred: claude-opus-4-6
  fallback:
    - claude-sonnet-4-5-20250929
    - claude-sonnet-4-20250514
  constraints:
    temperature: 0.4
    max_tokens: 16384

skills:
  - md-to-pdf
  - estimate-calibrator
  - architecture-diagram

runtime:
  max_turns: 50
  timeout: 600

tags:
  - proposal
  - roi
  - pricing
  - business
  - client-facing
  - bidding
  - sales
